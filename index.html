var ESTADO = MODULOS.map(function(m, i) {
  return { desbloqueado: i === 0, completado: false, diag: false, res: false, entregable: false };
});

var ALUMNOS = [];

function cambiarRol(rol) {
  ROL = rol;
  document.getElementById('tab-alumno').className = 'tab ' + (rol === 'alumno' ? 'activo' : 'inactivo');
  document.getElementById('tab-inst').className   = 'tab ' + (rol === 'instructor' ? 'activo' : 'inactivo');
  document.getElementById('campo-emp').style.display = rol === 'instructor' ? 'none' : '';
  if (rol === 'instructor') {
    document.getElementById('inp-nombre').value = 'Maricela Soto Macias';
  } else {
    document.getElementById('inp-nombre').value = '';
  }
}

function entrar() {
  var nombre = document.getElementById('inp-nombre').value.trim();
  var empresa = document.getElementById('inp-emp') ? document.getElementById('inp-emp').value.trim() : '';

  if (ROL === 'alumno') {
    if (!nombre)  { alert('Escribe tu nombre'); return; }
    if (!empresa) { alert('Escribe tu empresa'); return; }
    USUARIO = nombre;
    EMPRESA = empresa;
  } else {
    USUARIO = nombre || 'Maricela Soto Macias';
    EMPRESA = 'Crear Ideas - Instructora';
  }

  document.getElementById('sb-usuario').textContent = USUARIO + ' - ' + EMPRESA;
  document.getElementById('sb-rol').textContent = ROL === 'instructor' ? 'Instructora' : 'Alumno';

  if (ROL === 'instructor') {
    document.getElementById('link-panel').style.display = '';
    document.getElementById('barra-completar').style.display = 'none';
  }

  document.getElementById('pantalla-login').style.display = 'none';
  document.getElementById('pantalla-app').style.display = 'flex';

  construirNav();
  verModulo(0);
}

function salir() {
  document.getElementById('pantalla-app').style.display = 'none';
  document.getElementById('pantalla-login').style.display = 'flex';
  ROL = 'alumno';
  cambiarRol('alumno');
}

function construirNav() {
  var nav = document.getElementById('sb-nav');
  nav.innerHTML = '';
  MODULOS.forEach(function(m, i) {
    var e = ESTADO[i];
    var cls = 'nav-item';
    if (!e.desbloqueado && ROL !== 'instructor') cls += ' bloqueado';
    if (e.completado) cls += ' completado';
    if (i === MOD_ACTUAL) cls += ' activo';
    var numTexto = e.completado ? '&#10003;' : (i + 1);
    nav.innerHTML += '<div class="' + cls + '" onclick="clickNav(' + i + ')">' +
      '<div class="nav-num">' + numTexto + '</div>' +
      '<div class="nav-titulo">' + m.titulo + '</div>' +
      '</div>';
  });
  var completados = ESTADO.filter(function(e){ return e.completado; }).length;
  var pct = Math.round((completados / 11) * 100);
  document.getElementById('prog-barra').style.width = pct + '%';
  document.getElementById('prog-texto').textContent = pct + '% completado - ' + completados + '/11 modulos';
}

function clickNav(i) {
  if (!ESTADO[i].desbloqueado && ROL !== 'instructor') {
    mostrarToast('Completa el modulo anterior para desbloquear este.');
    return;
  }
  verModulo(i);
}

function verModulo(i) {
  MOD_ACTUAL = i;
  var m = MODULOS[i];
  var e = ESTADO[i];
  construirNav();

  document.getElementById('top-titulo').textContent = 'Modulo ' + m.num + ' - ' + m.titulo;
  document.getElementById('top-meta').textContent = m.sesion + ' - ' + m.horas + 'h';
  document.getElementById('top-fecha').textContent = m.fecha;

  var todosHechos = e.diag && e.res && e.entregable;
  var estadoEl = document.getElementById('top-estado');
  estadoEl.textContent = e.completado ? 'Completado' : todosHechos ? 'Listo' : 'En progreso';
  estadoEl.className = 'chip ' + (e.completado || todosHechos ? 'chip-ok' : 'chip-pending');

  var html = '';

  if (ROL === 'instructor') {
    html += '<div style="background:#1C4B9E;border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;color:white;">' +
      '<div style="font-size:10px;color:#F5C6CE;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:4px;">Panel del Instructor - Modulo ' + m.num + '</div>' +
      '<div style="font-size:14px;">Gestion de materiales, calificaciones y entregas</div>' +
      '<div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;">' +
      '<button class="btn btn-rojo" onclick="mostrarToast(\'Abre Drive para agregar material\')">+ Agregar material</button>' +
      '<button class="btn btn-rojo" onclick="verPanel()">Panel completo</button>' +
      '</div></div>';
  }

  html += '<div class="mod-header">' +
    '<div>' +
    '<div class="mod-session">' + m.sesion + '</div>' +
    '<div class="mod-titulo">' + m.titulo + '</div>' +
    '<div class="mod-sub">' + m.sub + '</div>' +
    '<div class="mod-entregable">Entregable: ' + m.entregable + '</div>' +
    '</div>' +
    '<div style="text-align:right;flex-shrink:0;">' +
    '<div class="mod-horas">' + m.horas + '</div>' +
    '<div class="mod-horas-label">hora de clase</div>' +
    '</div></div>';

  html += '<div class="material-card"><div class="section-label">Material de la sesion</div>';
  m.material.forEach(function(mat) {
    var icono = mat.tipo === 'video' ? '&#9654;' : mat.tipo === 'ppt' ? '&#128202;' : '&#128196;';
    var bg = mat.tipo === 'video' ? '#1C4B9E' : mat.tipo === 'ppt' ? '#FDF0F2' : '#E8EDF8';
    html += '<div class="mat-item" onclick="abrirMaterial(\'' + mat.url + '\',\'' + mat.titulo + '\')">' +
      '<div class="mat-icon" style="background:' + bg + ';color:' + (mat.tipo==='video'?'white':'#1C2B4A') + ';">' + icono + '</div>' +
      '<div><div class="mat-titulo">' + mat.titulo + '</div><div class="mat-desc">' + mat.desc + '</div></div>' +
      '<div class="mat-abrir">Abrir</div>' +
      '</div>';
  });
  html += '</div>';

  html += '<div class="actividades">' +
    tarjetaActividad('diagnostica', i, m, e) +
    tarjetaActividad('resultados', i, m, e) +
    tarjetaActividad('entregable', i, m, e) +
    '</div>';

  document.getElementById('contenido').innerHTML = html;
  actualizarBarraCompletar(i);
}

function tarjetaActividad(tipo, i, m, e) {
  var configs = {
    diagnostica: {
      badge: 'badge-diag', label: 'Evaluacion Diagnostica',
      titulo: 'Diagnostica',
      desc: 'Evalua conocimientos previos. No afecta calificacion. 5 preguntas.',
      hecho: e.diag, url: m.formDiag, btnLabel: 'Abrir en Google Forms'
    },
    resultados: {
      badge: 'badge-res', label: 'Evaluacion de Resultados',
      titulo: 'Evaluacion de Resultados',
      desc: 'Calificacion minima: 70/100. Cuenta para rubrica Coparmex.',
      hecho: e.res, url: m.formRes, btnLabel: 'Abrir en Google Forms'
    },
    entregable: {
      badge: 'badge-ent', label: 'Entregable',
      titulo: 'Subir entregable',
      desc: m.entregable + '. Sube a la carpeta Drive del modulo.',
      hecho: e.entregable, url: m.carpeta, btnLabel: 'Abrir carpeta Drive'
    }
  };
  var c = configs[tipo];
  var bloq = !e.desbloqueado && ROL !== 'instructor';
  return '<div class="act-card' + (c.hecho ? ' hecho' : '') + '" ' + (bloq ? 'style="opacity:0.5;pointer-events:none;"' : '') + '>' +
    '<div><span class="badge ' + (c.hecho ? 'badge-ok' : c.badge) + '">' + (c.hecho ? 'Completado' : c.label) + '</span></div>' +
    '<div class="act-titulo">' + c.titulo + '</div>' +
    '<div class="act-desc">' + c.desc + '</div>' +
    '<div class="act-footer">' +
    '<span class="act-estado' + (c.hecho ? ' hecho' : '') + '">' + (c.hecho ? 'Completado' : 'Pendiente') + '</span>' +
    '<div style="display:flex;gap:6px;">' +
    '<a class="btn btn-azul" href="' + c.url + '" target="_blank">' + c.btnLabel + '</a>' +
    ((!c.hecho && ROL !== 'instructor') ? '<button class="btn btn-verde" onclick="marcar(\'' + tipo + '\',' + i + ')">Marcar</button>' : '') +
    '</div></div></div>';
}

function marcar(tipo, i) {
  if (tipo === 'diagnostica') ESTADO[i].diag = true;
  if (tipo === 'resultados')  ESTADO[i].res  = true;
  if (tipo === 'entregable')  ESTADO[i].entregable = true;
  actualizarBarraCompletar(i);
  verModulo(i);
  mostrarToast('Actividad marcada como completada');
}

function actualizarBarraCompletar(i) {
  var e = ESTADO[i];
  var pasos = [e.diag, e.res, e.entregable];
  var html = '';
  pasos.forEach(function(p) { html += '<div class="paso ' + (p ? 'hecho' : '') + '"></div>'; });
  document.getElementById('pasos-mini').innerHTML = html;
  var todos = e.diag && e.res && e.entregable;
  document.getElementById('completar-label').textContent = todos
    ? 'Todo listo! Puedes completar el modulo.'
    : 'Pendiente: ' + (['Diagnostica','Resultados','Entregable'].filter(function(_, j){ return !pasos[j]; }).join(', '));
  var btn = document.getElementById('btn-completar');
  btn.disabled = !todos || e.completado;
  btn.textContent = e.completado ? 'Modulo completado' : 'Completar modulo';
}

function completarModulo() {
  var i = MOD_ACTUAL;
  ESTADO[i].completado = true;
  if (i + 1 < 11) ESTADO[i + 1].desbloqueado = true;
  construirNav();
  actualizarBarraCompletar(i);
  document.getElementById('m-icono').textContent = 'Trophy';
  document.getElementById('m-titulo').textContent = 'Modulo ' + (i+1) + ' completado!';
  document.getElementById('m-cuerpo').textContent = i + 1 < 11
    ? 'Excelente trabajo. El Modulo ' + (i+2) + ' esta ahora desbloqueado.'
    : 'Felicidades! Completaste todos los modulos del programa.';
  document.getElementById('modal').className = 'modal-fondo abierto';
}

function cerrarModal() {
  document.getElementById('modal').className = 'modal-fondo';
  verRubrica();
}

function siguienteModulo() {
  document.getElementById('modal').className = 'modal-fondo';
  var siguiente = MOD_ACTUAL + 1;
  if (siguiente < 11) verModulo(siguiente);
}

function verRubrica() {
  document.getElementById('top-titulo').textContent = 'Rubrica Coparmex';
  document.getElementById('top-meta').textContent = 'Reporte del grupo';
  document.getElementById('top-fecha').textContent = '';
  document.getElementById('top-estado').textContent = '';
  document.getElementById('barra-completar').style.display = 'none';
  var alumnos = ALUMNOS.length > 0 ? ALUMNOS : [
    {nombre:'(Alumno 1)', empresa:'-'}, {nombre:'(Alumno 2)', empresa:'-'},
    {nombre:'(Alumno 3)', empresa:'-'}
  ];
  var cols = MODULOS.map(function(m){ return '<th style="background:#1C4B9E;color:rgba(255,255,255,0.8);padding:8px;font-size:11px;white-space:nowrap;">M' + m.num + '</th>'; }).join('');
  var filas = alumnos.map(function(a) {
    var celdas = MODULOS.map(function(){ return '<td style="padding:8px;border-bottom:1px solid rgba(28,75,158,0.08);text-align:center;font-size:11px;color:#5A6A8A;">-</td>'; }).join('');
    return '<tr><td style="padding:8px;border-bottom:1px solid rgba(28,75,158,0.08);font-weight:600;">' + a.nombre + '</td>' +
      '<td style="padding:8px;border-bottom:1px solid rgba(28,75,158,0.08);font-size:11px;color:#5A6A8A;">' + a.empresa + '</td>' +
      celdas + '<td style="padding:8px;border-bottom:1px solid rgba(28,75,158,0.08);">-</td></tr>';
  }).join('');
  document.getElementById('contenido').innerHTML =
    '<div style="background:white;border-radius:14px;border:1px solid rgba(28,75,158,0.1);overflow:hidden;box-shadow:0 2px 12px rgba(28,75,158,0.06);">' +
    '<div style="padding:1.25rem 1.5rem;border-bottom:1px solid rgba(28,75,158,0.1);display:flex;align-items:center;justify-content:space-between;">' +
    '<div><div style="font-size:20px;font-weight:700;color:#1C4B9E;">Rubrica Coparmex</div>' +
    '<div style="font-size:13px;color:#5A6A8A;margin-top:2px;">Calificaciones por alumno y modulo</div></div>' +
    '<button class="btn btn-azul" onclick="exportarCSV()">Exportar CSV</button></div>' +
    '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">' +
    '<thead><tr><th style="background:#1C4B9E;color:#F5C6CE;padding:8px;text-align:left;">Alumno</th>' +
    '<th style="background:#1C4B9E;color:rgba(255,255,255,0.7);padding:8px;text-align:left;">Empresa</th>' +
    cols + '<th style="background:#1C4B9E;color:rgba(255,255,255,0.8);padding:8px;font-size:11px;">Promedio</th></tr></thead>' +
    '<tbody>' + filas + '</tbody></table></div></div>';
}

    '<button class="btn btn-azul" onclick="guardarAlumno()">Guardar alumno</button>' +
    '</div>' +
    '<div style="background:white;border-radius:14px;border:1px solid rgba(28,75,158,0.1);padding:1.5rem;box-shadow:0 2px 12px rgba(28,75,158,0.06);">' +
    '<div style="font-size:16px;font-weight:700;color:#1C4B9E;margin-bottom:1rem;">Alumnos registrados (' + ALUMNOS.length + ')</div>' +
    '<div id="lista-alumnos">' + (ALUMNOS.length === 0
      ? '<p style="color:#5A6A8A;font-size:14px;">Aun no hay alumnos. Agrega el primero arriba.</p>'
      : ALUMNOS.map(function(a,i){ return '<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid rgba(28,75,158,0.1);border-radius:8px;margin-bottom:6px;">' +
        '<div style="width:34px;height:34px;border-radius:50%;background:#E8EDF8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1C4B9E;flex-shrink:0;">' + a.nombre.split(' ').slice(0,2).map(function(w){return w[0];}).join('') + '</div>' +
        '<div style="flex:1;"><div style="font-size:13px;font-weight:600;color:#1C2B4A;">' + a.nombre + '</div><div style="font-size:11px;color:#5A6A8A;">' + a.empresa + ' - ' + (a.email||'sin email') + '</div></div>' +
        '<button class="btn btn-rojo" onclick="eliminarAlumno(' + i + ')">Eliminar</button></div>'; }).join('')
    ) + '</div></div>';
}

function guardarAlumno() {
  var n = document.getElementById('p-nombre').value.trim();
  var e = document.getElementById('p-empresa').value.trim();
  var em = document.getElementById('p-email').value.trim();
  var g = document.getElementById('p-giro').value.trim();
  if (!n || !e) { alert('Nombre y empresa son obligatorios'); return; }
  ALUMNOS.push({nombre: n, empresa: e, email: em, giro: g});
  mostrarToast('Alumno ' + n + ' agregado');
  verPanel();
}

function eliminarAlumno(i) {
  if (confirm('Eliminar a ' + ALUMNOS[i].nombre + '?')) {
    ALUMNOS.splice(i, 1);
    verPanel();
  }
}

function abrirMaterial(url, titulo) {
  if (url && url.length > 5) {
    window.open(url, '_blank');
  } else {
    mostrarToast('Material pendiente - la instructora lo subira antes de la sesion.');
  }
}

function exportarCSV() {
  var csv = 'Alumno,Empresa,' + MODULOS.map(function(m){return 'M'+m.num;}).join(',') + ',Promedio\n';
  (ALUMNOS.length > 0 ? ALUMNOS : [{nombre:'Alumno demo',empresa:'Empresa demo'}]).forEach(function(a) {
    csv += a.nombre + ',' + a.empresa + ',' + MODULOS.map(function(){return '-';}).join(',') + ',-\n';
  });
  var link = document.createElement('a');
  link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  link.download = 'Rubrica_Coparmex_RSE.csv';
  link.click();
}

function mostrarToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(function(){ t.remove(); }, 300); }, 3500);
}
</script>
</body>
</html>
